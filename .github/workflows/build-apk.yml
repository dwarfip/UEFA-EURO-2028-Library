name: EURO28

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Node.js & Cordova
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Run npm install -g cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: cordova create android-app com.contoh.app AplikasiSaya

    - name: Copy All Web Files & Config to App
      run: |
        # Membuat folder tujuan terlebih dahulu jika belum ada
        mkdir -p android-app/www/
        
        # Menyalin file html, css, js, dan folder Fonts secara spesifik agar tidak crash
        cp *.html android-app/www/ 2>/dev/null || true
        cp *.css android-app/www/ 2>/dev/null || true
        cp *.js android-app/www/ 2>/dev/null || true
        
        # Menyalin folder Fonts beserta isinya jika ada
        if [ -d "Fonts" ]; then cp -r Fonts android-app/www/; fi
        if [ -d "www/Fonts" ]; then cp -r www/Fonts android-app/www/; fi

    - name: Build APK File
      run: |
        cd android-app
        cordova platform add android
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-HTML-Debug-APK
        path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        
