name: EURO28

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Node.js & Cordova
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Run npm install -g cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: cordova create android-app com.contoh.app EURO28

    - name: Copy All Web Files & Config to App
      run: |
        # 1. Hapus folder www bawaan dari Cordova terlebih dahulu
        rm -rf android-app/www
        
        # 2. Salin seluruh folder www milik Anda beserta semua isinya tanpa kecuali
        cp -r www android-app/www
        
        # 3. Pengaturan Logo Otomatis (Mengambil logo.png dari dalam folder www)
        if [ -f "android-app/www/logo.png" ]; then 
          cp android-app/www/logo.png android-app/logo.png
          cd android-app
          sed -i '/<\/widget>/i \    <icon src="logo.png" \/>' config.xml
        fi
        

    - name: Build APK File
      run: |
        cd android-app
        cordova platform add android
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-HTML-Debug-APK
        path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        
